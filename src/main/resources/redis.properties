# Redis Configuration
# Redis服务器地址
redis.host=localhost
# Redis服务器连接端口
redis.port=6379
# Redis服务器连接密码(默认为空)
redis.password=
# 连接超时时间(毫秒)
redis.timeout=2000
# 连接池最大连接数(使用负数表示没有限制)
redis.pool.maxActive=8
# 连接池最大空闲连接数
redis.pool.maxIdle=8
# 连接池最小空闲连接数
redis.pool.minIdle=0
# 连接池最大阻塞等待时间(毫秒,-1表示没有限制)
redis.pool.maxWait=-1
